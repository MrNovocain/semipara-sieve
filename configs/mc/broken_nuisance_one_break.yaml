experiment:
  name: broken_nuisance_one_break
  n_replications: 200
  global_seed: 20260701
  beta0: 0.0
  beta: 0.0

dgp:
  name: broken_nuisance_ar1
  params:
    T: 250
    burnin: 300
    x_initialization: zero_at_sample_start
    a_w: 0.5
    kappa: 0.0
    xi: 0.0
    break_fraction: 0.5
    m_left:
      name: zero
      params:
        level: 0.0
    m_right:
      name: zero
      params:
        level: 1.0
    sigma_u: 1.0

rho_design:
  label: stationary_high
  formula: fixed
  value: 0.95

sieve:
  K: 4

weights:
  bounded_main:
    name: tanh
    params:
      b: 8.0

workbook_breaks:
  selector: workbook_one_break
  q_max: 1
  min_size: 60
  grid_step: 4
  a_K: 0.0
  kappa_T: null
  report_rate_diagnostics: true

outputs:
  root: results
  run_id: broken_nuisance_one_break
  overwrite: false
